<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-header">
      <i class="fa-solid fa-burger"></i>
      <h2>FoodHub</h2>
    </div>
    
    <p class="subtitle">Welcome back! Please login to your account.</p>

    <!-- 🔴 Error -->
    <div class="error-msg" *ngIf="message">
      <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
    </div>

    <div class="form-group">
      <label>I am a</label>
      <div class="role-selector">
        <button 
          [class.active]="selectedRole === 'USER'" 
          (click)="selectedRole = 'USER'"
          class="role-btn">User
        </button>
        <button 
          [class.active]="selectedRole === 'OWNER'" 
          (click)="selectedRole = 'OWNER'"
          class="role-btn">Restaurant Owner
        </button>
      </div>
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-icon">
        <i class="fa-regular fa-envelope"></i>
        <input
          type="email"
          placeholder="name@example.com"
          [(ngModel)]="email"
        />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input
          type="password"
          placeholder="Enter your password"
          [(ngModel)]="password"
        />
      </div>
    </div>

    <button class="btn-primary" (click)="login()" [disabled]="loading">
      {{ loading ? 'Authenticating...' : 'Sign In' }}
      <i class="fa-solid fa-arrow-right" *ngIf="!loading"></i>
    </button>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Create one now</a>
    </p>

  </div>
</div>
